<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Studio - Catálogo</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="../logo.png" alt="Logo de la Marca" class="logo">
        </div>
        <div class="search-container">
            <input type="text" id="busqueda" placeholder="Buscar productos...">
            <i class="fas fa-search search-icon"></i>
        </div>
        <div class="cart-icon-container" id="cart-icon">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </header>

    <main>
        <section id="productos">
            <div id="contenedor-productos" class="productos-grid">
                </div>
        </section>
    </main>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="close-cart">&times;</span>
            <h2>Tu Carrito</h2>
            <div id="cart-items"></div>
            <div class="cart-total">
                <p>Total: $<span id="total-price">0</span></p>
            </div>
            
            <div class="payment-methods">
                <h3>Medios de Pago</h3>
                <div class="payment-options">
                    <img src="https://logotipous.com/wp-content/uploads/2022/03/mercadopago-logo.png" alt="Mercado Pago" class="payment-logo">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/Ual%C3%A1_Logo.svg/1200px-Ual%C3%A1_Logo.svg.png" alt="Ualá" class="payment-logo">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal" class="payment-logo">
                </div>
            </div>

            <button id="checkout-button" class="checkout-button">Finalizar Compra por WhatsApp</button>
        </div>
    </div>

    <div id="product-modal" class="modal">
        <div class="modal-content product-detail-content">
            <span class="close-button" id="close-product-modal">&times;</span>
            <div id="product-detail-body"></div>
        </div>
    </div>

    <script src="../script.js"></script>

    <script>
        const urlAPI = 'https://script.google.com/macros/s/AKfycbz_6-2B-3l29H_pXfX3Z9X9Z9X9Z9X9Z9X9Z/exec'; 

        let productosData = [];
        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];

        async function cargarProductos() {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = '<p>Cargando productos...</p>';

            try {
                const respuesta = await fetch(urlAPI);
                productosData = await respuesta.json();
                mostrarProductos(productosData);
            } catch (error) {
                contenedor.innerHTML = '<p>Error al cargar los productos. Por favor, intenta de nuevo más tarde.</p>';
                console.error('Error:', error);
            }
        }

        function mostrarProductos(productos) {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = '';

            productos.forEach((producto, index) => {
                if (index === 0) return; 

                const productoDiv = document.createElement('div');
                productoDiv.classList.add('producto-card');
                
                const precio = parseFloat(producto[2]).toLocaleString('es-AR', { minimumFractionDigits: 2 });

                productoDiv.innerHTML = `
                    <div class="producto-imagen-container">
                        <img src="${producto[4]}" alt="${producto[0]}" class="producto-imagen" onclick="abrirDetalle(${index})">
                    </div>
                    <div class="producto-info">
                        <h3 onclick="abrirDetalle(${index})">${producto[0]}</h3>
                        <p class="descripcion-corta">${producto[1]}</p>
                        <p class="precio">$${precio}</p>
                        <button class="add-to-cart" onclick="agregarAlCarrito(${index})">Agregar al Carrito</button>
                    </div>
                `;
                contenedor.appendChild(productoDiv);
            });
        }

        function agregarAlCarrito(index) {
            const producto = productosData[index];
            const itemExistente = carrito.find(item => item.nombre === producto[0]);

            if (itemExistente) {
                itemExistente.cantidad++;
            } else {
                carrito.push({
                    nombre: producto[0],
                    precio: parseFloat(producto[2]),
                    imagen: producto[4],
                    cantidad: 1
                });
            }

            actualizarCarrito();
            guardarCarrito();
        }

        function actualizarCarrito() {
            const cartCount = document.getElementById('cart-count');
            const cartItems = document.getElementById('cart-items');
            const totalPrice = document.getElementById('total-price');

            let totalProductos = 0;
            let precioTotal = 0;

            cartItems.innerHTML = '';

            carrito.forEach((item, index) => {
                totalProductos += item.cantidad;
                precioTotal += item.precio * item.cantidad;

                const itemDiv = document.createElement('div');
                itemDiv.classList.add('cart-item');
                itemDiv.innerHTML = `
                    <img src="${item.imagen}" alt="${item.nombre}">
                    <div class="cart-item-info">
                        <h4>${item.nombre}</h4>
                        <p>$${item.precio.toLocaleString('es-AR')} x ${item.cantidad}</p>
                    </div>
                    <div class="cart-item-actions">
                        <button onclick="cambiarCantidad(${index}, -1)">-</button>
                        <span>${item.cantidad}</span>
                        <button onclick="cambiarCantidad(${index}, 1)">+</button>
                        <button onclick="eliminarDelCarrito(${index})" class="delete-item"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                cartItems.appendChild(itemDiv);
            });

            cartCount.textContent = totalProductos;
            totalPrice.textContent = precioTotal.toLocaleString('es-AR', { minimumFractionDigits: 2 });
        }

        function cambiarCantidad(index, cambio) {
            carrito[index].cantidad += cambio;
            if (carrito[index].cantidad <= 0) {
                eliminarDelCarrito(index);
            } else {
                actualizarCarrito();
                guardarCarrito();
            }
        }

        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            actualizarCarrito();
            guardarCarrito();
        }

        function guardarCarrito() {
            localStorage.setItem('carrito', JSON.stringify(carrito));
        }

        function abrirDetalle(index) {
            const producto = productosData[index];
            const modal = document.getElementById('product-modal');
            const body = document.getElementById('product-detail-body');
            
            const precio = parseFloat(producto[2]).toLocaleString('es-AR', { minimumFractionDigits: 2 });

            body.innerHTML = `
                <div class="product-detail-grid">
                    <img src="${producto[4]}" alt="${producto[0]}">
                    <div>
                        <h2>${producto[0]}</h2>
                        <p class="precio-detalle">$${precio}</p>
                        <p class="descripcion-larga">${producto[1]}</p>
                        <button class="add-to-cart" onclick="agregarAlCarrito(${index}); cerrarModales();">Agregar al Carrito</button>
                    </div>
                </div>
            `;
            modal.style.display = 'block';
        }

        function cerrarModales() {
            document.getElementById('cart-modal').style.display = 'none';
            document.getElementById('product-modal').style.display = 'none';
        }

        document.getElementById('cart-icon').onclick = () => {
            document.getElementById('cart-modal').style.display = 'block';
        };

        document.getElementById('close-cart').onclick = cerrarModales;
        document.getElementById('close-product-modal').onclick = cerrarModales;

        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                cerrarModales();
            }
        };

        document.getElementById('busqueda').oninput = (e) => {
            const termino = e.target.value.toLowerCase();
            const filtrados = productosData.filter((p, i) => {
                if (i === 0) return false;
                return p[0].toLowerCase().includes(termino) || p[1].toLowerCase().includes(termino);
            });
            mostrarProductos(filtrados);
        };

        document.getElementById('checkout-button').onclick = () => {
            if (carrito.length === 0) {
                alert('El carrito está vacío');
                return;
            }

            let mensaje = '¡Hola! Me gustaría comprar los siguientes productos:\n\n';
            let total = 0;

            carrito.forEach(item => {
                mensaje += `- ${item.nombre} (x${item.cantidad}): $${(item.precio * item.cantidad).toLocaleString('es-AR')}\n`;
                total += item.precio * item.cantidad;
            });

            mensaje += `\n*Total: $${total.toLocaleString('es-AR')}*`;
            const mensajeCodificado = encodeURIComponent(mensaje);
            window.open(`https://wa.me/5491111111111?text=${mensajeCodificado}`, '_blank');
        };

        cargarProductos();
        actualizarCarrito();
    </script>
</body>
</html>
