    <style>
        :root {
            --color-fondo: #ffffff;
            --color-texto: #1a1a1a;
            --color-acento: #d4af37;
            --color-secundario: #f4f4f4;
            --color-whatsapp: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--color-fondo); color: var(--color-texto); overflow-x: hidden; }
        h1, h2, h3, .logo { font-family: 'Playfair Display', serif; }

        /* HEADER */
        header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); z-index: 1000; border-bottom: 1px solid #eee; }
        .top-bar { background-color: var(--color-texto); color: var(--color-acento); text-align: center; padding: 10px; font-size: 0.85em; letter-spacing: 1px; font-weight: 600; text-transform: uppercase;}
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; }
        .logo { font-size: 1.8em; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .menu a { text-decoration: none; color: var(--color-texto); margin: 0 15px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .menu a:hover { color: var(--color-acento); }
        .iconos-nav { position: relative; cursor: pointer; }
        .contador-carrito { position: absolute; top: -8px; right: -10px; background: var(--color-acento); color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7em; font-weight: bold; }

        /* CARRUSEL */
        .carrusel-contenedor { position: relative; height: 60vh; width: 100%; overflow: hidden; background-color: #000; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .slide.activo { opacity: 1; }
        .slide-texto { text-align: center; color: white; background: rgba(0,0,0,0.3); padding: 30px 50px; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(2px); width: 80%; }
        .slide-texto h2 { font-size: 2.5em; margin-bottom: 10px; font-weight: 400; }

        /* PRODUCTOS DESTACADOS */
        .seccion-destacado { padding: 50px 5%; background-color: var(--color-secundario); display: none; }
        .titulo-destacado { text-align: center; font-size: 1.8em; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        
        .grid-destacados { 
            display: flex; 
            gap: 30px; 
            overflow-x: auto; 
            padding: 10px 10px 30px 10px; 
            scroll-snap-type: x mandatory; 
            width: 100%;
            margin: 0 auto;
        }
        
        .grid-destacados::-webkit-scrollbar { height: 8px; }
        .grid-destacados::-webkit-scrollbar-thumb { background: var(--color-acento); border-radius: 10px; }

        .tarjeta-destacado { 
            flex: 0 0 280px; 
            scroll-snap-align: start;
            background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: center; padding-bottom: 20px; border-top: 4px solid var(--color-acento); position: relative;
        }

        /* CATÁLOGO */
        .seccion-padding { padding: 60px 5%; min-height: 400px; }
        .titulo-seccion { text-align: center; font-size: 2.2em; margin-bottom: 40px; font-weight: 400; }
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        
        .tarjeta { position: relative; text-align: center; border: 1px solid #eee; padding-bottom: 20px; border-radius: 8px; overflow: hidden; background: white;}
        .tarjeta img, .tarjeta-destacado img { width: 100%; height: 280px; object-fit: cover; margin-bottom: 15px; }

        .precio { font-size: 1.3em; color: var(--color-texto); font-weight: 600; margin-bottom: 15px; }
        .descripcion-producto { font-size: 0.85em; color: #666; padding: 0 15px; margin-bottom: 15px; height: 40px; overflow: hidden; }
