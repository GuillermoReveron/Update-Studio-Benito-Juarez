<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Repuestos | Update Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #ef4444; --text: #f8fafc; --whatsapp: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; }
        
        header { 
            position: sticky; top: 0; z-index: 1000; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Oswald', sans-serif; font-size: 1.5rem; text-transform: uppercase; color: var(--text); }
        .logo span { color: var(--accent); }

        /* Estilos del Carrusel para evitar el Negro */
        .swiper { width: 100%; height: 500px; background: #111; }
        .swiper-slide { position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        .swiper-slide img { 
            width: 100%; height: 100%; object-fit: cover; 
            opacity: 0.6; /* Un poco de opacidad para que se lea el texto */
        }
        .slide-txt { position: absolute; text-align: center; z-index: 10; padding: 0 20px; width: 100%; }
        .slide-txt h2 { font-size: 3.5rem; font-family: 'Oswald'; text-transform: uppercase; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .slide-txt p { font-size: 1.2rem; color: #eee; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }

        .search-box { padding: 30px 5%; text-align: center; }
        #buscador { width: 100%; max-width: 500px; padding: 15px 25px; border-radius: 30px; border: 1px solid #334155; background: var(--card); color: white; font-size: 1rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px 5%; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 20px; }
        .precio { font-size: 1.8rem; font-weight: 900; color: var(--accent); margin: 15px 0; }
        
        .btn-add { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-add:active { transform: scale(0.95); }

        .cart-btn { position: fixed; bottom: 30px; right: 30px; background: var(--whatsapp); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1001; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        #badge { position: absolute; top: 0; right: 0; background: white; color: black; padding: 4px 10px; border-radius: 50%; font-size: 12px; font-weight: 900; border: 2px solid var(--whatsapp); }

        footer { padding: 40px; text-align: center; color: #64748b; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header>
        <div class="logo">BRUNO<span>.REPUESTOS</span></div>
    </header>

    <div class="swiper">
        <div class="swiper-wrapper" id="slider-content">
            </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="search-box">
        <input type="text" id="buscador" placeholder="Buscá por nombre de repuesto..." onkeyup="buscar()">
    </div>

    <div class="grid" id="lista-productos">
        <p style="text-align: center; grid-column: 1/-1;">Conectando con Update Studio...</p>
    </div>

    <div class="cart-btn" onclick="enviarWhatsApp()">
        <i class="fas fa-shopping-cart fa-lg" style="color:white"></i>
        <span id="badge">0</span>
    </div>

    <footer>DESARROLLADO POR UPDATE STUDIO &copy; 2026</footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbytc8G0oTOuHbF1nmzHpGwrsC5eNZVPMzRJIJ3gzstxfWY-4vn_BW6_4Covw6dH6wdW/exec';
        let productos = [];
        let carrito = [];

        async function cargar() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // CARRUSEL - Manejo de errores de imagen
                const slider = document.getElementById('slider-content');
                if (data.carrusel && data.carrusel.length > 0) {
                    slider.innerHTML = data.carrusel.map(c => {
                        const imgUrl = (c.img || c.Img || '').trim();
                        return `
                        <div class="swiper-slide">
                            <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/1200x500?text=Error+en+Link+de+Imagen'">
                            <div class="slide-txt">
                                <h2>${c.titulo || c.Titulo || ''}</h2>
                                <p>${c.descripcion || c.Descripcion || ''}</p>
                            </div>
                        </div>`;
                    }).join('');
                    
                    new Swiper('.swiper', { 
                        pagination: { el: '.swiper-pagination', clickable: true }, 
                        autoplay: { delay: 4000 }, 
                        loop: true,
                        effect: 'fade'
                    });
                }

                // PRODUCTOS
                productos = data.productos || [];
                renderizar(productos);
            } catch (e) {
                console.error(e);
                document.getElementById('lista-productos').innerHTML = "Error de conexión. Verificá el link de la API.";
            }
        }

        function renderizar(lista) {
            const container = document.getElementById('lista-productos');
            if (lista.length === 0) {
                container.innerHTML = "No hay productos disponibles.";
                return;
            }
            container.innerHTML = lista.map(p => `
                <div class="card">
                    <img src="${p.img || p.Img || 'https://via.placeholder.com/400x300'}" onerror="this.src='https://via.placeholder.com/400x300?text=Imagen+No+Disponible'">
                    <div class="card-body">
                        <h3>${p.nombre || p.Nombre || 'Repuesto'}</h3>
                        <p style="color:#94a3b8; font-size:0.85rem; margin-top:5px;">${p.descripcion || p.Descripcion || ''}</p>
                        <div class="precio">$${Number(p.precio || 0).toLocaleString('es-AR')}</div>
                        <button class="btn-add" onclick="agregar(${p.id || p.Id})">AÑADIR AL PEDIDO</button>
                    </div>
                </div>
            `).join('');
        }

        function buscar() {
            const q = document.getElementById('buscador').value.toLowerCase();
            const filtrados = productos.filter(p => (p.nombre || p.Nombre || '').toLowerCase().includes(q));
            renderizar(filtrados);
        }

        function agregar(id) {
            const p = productos.find(x => (x.id || x.Id) == id);
            if(p) {
                carrito.push(p);
                document.getElementById('badge').innerText = carrito.length;
            }
        }

        function enviarWhatsApp() {
            if (carrito.length === 0) return alert("Elegí algún repuesto primero.");
            let total = 0;
            let m = "Hola Bruno! Te paso mi pedido de repuestos:\n\n";
            carrito.forEach(i => {
                m += `• ${i.nombre || i.Nombre} ($${i.precio || i.Precio})\n`;
                total += Number(i.precio || 0);
            });
            m += `\n*Total: $${total.toLocaleString('es-AR')}*`;
            window.open(`https://wa.me/5492281310771?text=${encodeURIComponent(m)}`);
        }

        cargar();
    </script>
</body>
</html>
