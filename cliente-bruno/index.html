<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Repuestos | Catálogo Industrial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #ef4444; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(15, 23, 42, 0.9);
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); scroll-behavior: smooth; overflow-x: hidden; }

        /* HEADER */
        header { 
            position: sticky; top: 0; z-index: 1000; background: var(--glass); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 5%; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Oswald', sans-serif; font-size: 1.5rem; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        
        nav a { color: var(--text-main); text-decoration: none; margin-left: 20px; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }

        /* CARRUSEL (CALECITA) */
        .swiper { width: 100%; height: 500px; background: #000; }
        .swiper-slide { position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        .slide-content { position: absolute; text-align: center; z-index: 10; padding: 0 20px; }
        .slide-content h2 { font-size: 3.5rem; font-family: 'Oswald', sans-serif; text-transform: uppercase; margin-bottom: 10px; line-height: 1; }
        .slide-content p { font-size: 1.2rem; color: var(--text-dim); font-weight: 300; }

        /* BUSCADOR */
        .search-section { padding: 40px 5%; text-align: center; background: #111827; }
        #buscador {
            width: 100%; max-width: 600px; padding: 15px 25px; border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.1); background: var(--bg);
            color: white; font-size: 1.1rem; transition: 0.3s; text-align: center;
        }
        #buscador:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }

        /* GRID PRODUCTOS */
        .container { padding: 50px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-body h3 { font-size: 1.2rem; margin-bottom: 10px; color: #fff; font-weight: 700; height: 50px; }
        .precio { font-size: 1.8rem; font-weight: 900; color: var(--accent); margin-bottom: 20px; }
        
        .btn-add { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: auto; }
        .btn-add:hover { filter: brightness(1.2); }

        /* CARRITO LATERAL */
        .cart-panel { position: fixed; top: 0; right: -100%; width: 400px; height: 100%; background: var(--card-bg); z-index: 2000; box-shadow: -10px 0 30px rgba(0,0,0,0.5); transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); padding: 40px 30px; display: flex; flex-direction: column; }
        .cart-panel.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .cart-items { flex-grow: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-checkout { background: var(--success); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer; width: 100%; font-size: 1.1rem; margin-top: 20px; }

        /* FLOATING BUTTON */
        .cart-trigger { position: fixed; bottom: 30px; right: 30px; background: var(--accent); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4); }
        #badge { position: absolute; top: 0; right: 0; background: white; color: var(--bg); font-weight: 900; padding: 3px 8px; border-radius: 50%; font-size: 12px; }

        footer { padding: 40px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); color: var(--text-dim); font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">BRUNO<span>.REPUESTOS</span></div>
        <nav><a href="#inicio">Inicio</a><a href="#catalogo">Catálogo</a><a href="#contacto">Contacto</a></nav>
    </header>

    <div class="swiper" id="inicio">
        <div class="swiper-wrapper" id="slider-content"></div>
        <div class="swiper-pagination"></div>
    </div>

    <section class="search-section" id="catalogo">
        <input type="text" id="buscador" placeholder="¿Qué pieza estás buscando?" onkeyup="filtrar()">
    </section>

    <main class="container">
        <div class="grid" id="lista-productos">
            </div>
    </main>

    <section id="contacto" style="padding: 80px 5%; text-align: center; background: #0a0f1e;">
        <h2 style="font-family: 'Oswald'; font-size: 2.5rem; margin-bottom: 20px;">CONTACTO</h2>
        <p style="color: var(--text-dim); margin-bottom: 30px;">Venta de repuestos y accesorios en Benito Juárez.</p>
        <div style="font-size: 2rem; display: flex; justify-content: center; gap: 40px;">
            <i class="fab fa-whatsapp" style
