<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Repuestos | Catálogo Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-fondo: #ffffff;
            --color-texto: #1a1a1a;
            --color-acento: #333333; /* Color más sobrio para repuestos */
            --color-secundario: #f4f4f4;
            --color-whatsapp: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--color-fondo); color: var(--color-texto); }
        h1, h2, h3, .logo { font-family: 'Playfair Display', serif; }

        /* HEADER */
        header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); z-index: 1000; border-bottom: 1px solid #eee; }
        .top-bar { background-color: var(--color-texto); color: white; text-align: center; padding: 10px; font-size: 0.85em; letter-spacing: 1px; font-weight: 600; text-transform: uppercase;}
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; }
        .logo { font-size: 2em; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .iconos-nav { position: relative; cursor: pointer; }
        .contador-carrito { position: absolute; top: -8px; right: -10px; background: #cc0000; color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7em; font-weight: bold; }

        /* GRID PRODUCTOS */
        .seccion-padding { padding: 60px 5%; min-height: 400px; }
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        .tarjeta { position: relative; text-align: center; transition: transform 0.3s; border: 1px solid #eee; padding-bottom: 20px; border-radius: 8px; overflow: hidden; background: white;}
        .tarjeta img { width: 100%; height: 250px; object-fit: cover; margin-bottom: 15px; }
        .precio { font-size: 1.4em; color: var(--color-texto); font-weight: 600; margin-bottom: 20px; }

        /* BOTONES */
        .btn { width: 90%; padding: 12px; border: none; text-transform: uppercase; font-weight: 600; cursor: pointer; border-radius: 4px; background-color: var(--color-texto); color: white; margin-top: 10px;}
        
        /* CARRITO */
        .carrito-lateral { position: fixed; top: 0; right: -400px; width: 350px; height: 100vh; background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1); transition: right 0.3s ease; z-index: 2000; padding: 20px; }
        .carrito-lateral.abierto { right: 0; }
    </style>
</head>
<body>

    <div class="top-bar">Catálogo de Repuestos - Bruno Repuestos</div>

    <header>
        <nav class="navbar">
            <div class="logo">Bruno Repuestos</div>
            <div class="iconos-nav" onclick="toggleCarrito()">
                <i class="fas fa-shopping-cart fa-lg"></i>
                <span class="contador-carrito" id="contador">0</span>
            </div>
        </nav>
    </header>

    <section id="catalogo" class="seccion-padding">
        <div class="grid-productos" id="contenedor-productos">
            <p style="text-align:center;">Cargando repuestos...</p>
        </div>
    </section>

    <div class="carrito-lateral" id="carrito-lateral">
        <div onclick="toggleCarrito()" style="cursor:pointer; text-align:right;">CERRAR X</div>
        <h3>Tu Pedido</h3>
        <div id="items-carrito"></div>
        <button class="btn" onclick="enviarWhatsApp()">Enviar pedido por WhatsApp</button>
    </div>

    <script>
        // LA API DE BRUNO QUE ME PASASTE
        const urlAPI = 'https://script.google.com/macros/s/AKfycbyKD84ocKmzBSiotyAscvW3Qi8rOiUEHqLOtDYG691-ftw55ceLEqFCliYofdPlkaG3/exec';
        const numeroWhatsapp = "5492281310771"; // El número de Bruno
        let productos = [];
        let carrito = [];

        async function cargarDatos() {
            try {
                const respuesta = await fetch(urlAPI);
                const data = await respuesta.json();
                productos = Array.isArray(data) ? data : data.productos;
                dibujarCatalogo();
            } catch (e) { console.error(e); }
        }

        function dibujarCatalogo() {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = '';
            productos.forEach(p => {
                contenedor.innerHTML += `
                    <div class="tarjeta">
                        <img src="${p.img || 'https://via.placeholder.com/250'}" alt="${p.nombre}">
                        <h3>${p.nombre}</h3>
                        <div class="precio">$${Number(p.precio).toLocaleString('es-AR')}</div>
                        <button class="btn" onclick="agregarAlCarrito(${p.id})">Agregar al Carrito</button>
                    </div>
                `;
            });
        }

        function toggleCarrito() { document.getElementById('carrito-lateral').classList.toggle('abierto'); }

        function agregarAlCarrito(id) {
            const p = productos.find(prod => prod.id == id);
            carrito.push(p);
            document.getElementById('contador').innerText = carrito.length;
            actualizarCarrito();
        }

        function actualizarCarrito() {
            const items = document.getElementById('items-carrito');
            items.innerHTML = '';
            carrito.forEach(i => {
                items.innerHTML += `<p>${i.nombre} - $${i.precio}</p>`;
            });
        }

        function enviarWhatsApp() {
            let texto = "Hola Bruno, quiero estos repuestos:\n";
            carrito.forEach(i => texto += `- ${i.nombre}\n`);
            window.open(`https://wa.me/${numeroWhatsapp}?text=${encodeURIComponent(texto)}`);
        }

        cargarDatos();
    </script>
</body>
</html>
