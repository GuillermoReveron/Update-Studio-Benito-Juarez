<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Repuestos | Update Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #ef4444; 
            --text: #f8fafc;
            --whatsapp: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); scroll-behavior: smooth; }

        /* Navegación Premium */
        header { 
            position: sticky; top: 0; z-index: 1000; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Oswald', sans-serif; font-size: 1.6rem; letter-spacing: 1px; color: var(--text); text-transform: uppercase; }
        .logo span { color: var(--accent); }
        nav a { color: var(--text); text-decoration: none; margin-left: 20px; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Calecita (Carrusel Dinámico) */
        .swiper { width: 100%; height: 500px; background: #000; }
        .swiper-slide { position: relative; display: flex; align-items: center; justify-content: center; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        .slide-txt { position: absolute; text-align: center; max-width: 800px; padding: 0 20px; z-index: 10; }
        .slide-txt h2 { font-size: 3.5rem; font-family: 'Oswald'; text-transform: uppercase; margin-bottom: 10px; line-height: 1; }
        .slide-txt p { font-size: 1.2rem; color: #cbd5e1; font-weight: 300; }

        /* Buscador Avanzado */
        .search-box { padding: 40px 5%; background: #111827; text-align: center; }
        #buscador {
            width: 100%; max-width: 600px; padding: 18px 30px; border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.1); background: var(--bg);
            color: white; font-size: 1.1rem; transition: 0.3s; text-align: center;
        }
        #buscador:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }

        /* Catálogo de Productos */
        .container { padding: 50px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { 
            background: var(--card); border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.4s;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .card img { width: 100%; height: 260px; object-fit: cover; }
        .card-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-body h3 { font-size: 1.2rem; margin-bottom: 10px; font-weight: 700; color: #fff; }
        .precio { font-size: 2rem; font-weight: 900; color: var(--accent); margin-bottom: 20px; }
        
        .btn-buy { 
            background: var(--accent); color: white; border: none; padding: 15px; 
            border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; margin-top: auto;
        }
        .btn-buy:hover { filter: brightness(1.2); }

        /* Contacto */
        .contacto { padding: 100px 5%; background: #020617; text-align: center; }
        .contacto h2 { font-family: 'Oswald'; font-size: 3rem; margin-bottom: 15px; text-transform: uppercase; }
        .info-contacto { display: flex; justify-content: center; gap: 40px; margin-top: 40px; font-size: 2rem; }
        .info-contacto i { color: var(--accent); cursor: pointer; transition: 0.3s; }
        .info-contacto i:hover { transform: translateY(-5px); color: #fff; }

        /* Carrito Flotante */
        .cart-float {
            position: fixed; bottom: 30px; right: 30px; 
            background: var(--whatsapp); width: 70px; height: 70px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); cursor: pointer; z-index: 1001;
            transition: 0.3s;
        }
        .cart-float:hover { transform: scale(1.1); }
        #badge { position: absolute; top: 0; right: 0; background: white; color: var(--bg); font-weight: 900; padding: 4px 10px; border-radius: 50%; font-size: 14px; border: 2px solid var(--whatsapp); }

        footer { padding: 50px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); color: #64748b; font-size: 0.85rem; letter-spacing: 1px; }

        /* Estilo para el Swiper */
        .swiper-pagination-bullet { background: #fff !important; }
        .swiper-pagination-bullet-active { background: var(--accent) !important; }

        @media (max-width: 768px) {
            .slide-txt h2 { font-size: 2.2rem; }
            .nav-desktop { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">BRUNO<span>.REPUESTOS</span></div>
        <nav class="nav-desktop">
            <a href="#inicio">Inicio</a>
            <a href="#catalogo">Catálogo</a>
            <a href="#contacto">Contacto</a>
        </nav>
    </header>

    <div class="swiper" id="inicio">
        <div class="swiper-wrapper" id="carrusel-items">
            </div>
        <div class="swiper-pagination"></div>
    </div>

    <section class="search-box">
        <input type="text" id="buscador" placeholder="Buscá tu repuesto aquí..." onkeyup="filtrar()">
    </section>

    <main class="container" id="catalogo">
        <div class="grid" id="grid-productos">
            </div>
    </main>

    <section class="contacto" id="contacto">
        <h2>CONTACTO</h2>
        <p>Encontranos en Benito Juárez. Calidad y confianza.</p>
        <div class="info-contacto">
            <i class="fab fa-whatsapp" onclick="window.open('https://wa.me/5492281310771')"></i>
            <i class="fas fa-map-marker-alt" title="Benito Juárez"></i>
            <i class="fab fa-instagram"></i>
        </div>
    </section>

    <footer>
        <p>DISEÑADO POR <strong>UPDATE STUDIO</strong> &copy; 2026</p>
    </footer>

    <div class="cart-float" onclick="enviarPedido()">
        <i class="fas fa-shopping-cart fa-lg" style="color:white"></i>
        <span id="badge">0</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // EL LINK DE TU NUEVA API
        const API_URL = 'https://script.google.com/macros/s/AKfycbxzt_H5NGX42uZA1qvPD232h1VEFn7lwSrUtkkiCiwy7JvKzfIHPbyh0K689-olMBhl/exec';
        
        let productos = [];
        let carrito = [];

        async function cargarDatos() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // 1. Cargar Carrusel
                const carrusel = document.getElementById('carrusel-items');
                if(data.carrusel && data.carrusel.length > 0) {
                    carrusel.innerHTML = data.carrusel.map(c => `
                        <div class="swiper-slide">
                            <img src="${c.img}" alt="Banner Bruno">
                            <div class="slide-txt">
                                <h2>${c.titulo || ''}</h2>
                                <p>${c.subtitulo || ''}</p>
                            </div>
                        </div>
                    `).join('');
                    
                    new Swiper('.swiper', { 
                        pagination: { el: '.swiper-pagination', clickable: true }, 
                        autoplay: { delay: 5000 }, 
                        loop: true,
                        effect: 'fade',
                        fadeEffect: { crossFade: true }
                    });
                }

                // 2. Cargar Productos
                productos = data.productos;
                renderizar(productos);

            } catch (e) {
                console.error("Error cargando la planilla:", e);
                document.getElementById('grid-productos').innerHTML = "<p>Error al conectar con la planilla. Verificá los permisos.</p>";
            }
        }

        function renderizar(lista) {
            const container = document.getElementById('grid-productos');
            container.innerHTML = lista.map(p => `
                <div class="card">
                    <img src="${p.img || 'https://via.placeholder.com/400x300?text=Repuesto'}" alt="${p.nombre}">
                    <div class="card-body">
                        <h3>${p.nombre}</h3>
                        <p style="color:#94a3b8; font-size:0.85rem; margin-bottom:15px;">${p.descripcion || ''}</p>
                        <div class="precio">$${Number(p.precio).toLocaleString('es-AR')}</div>
                        <button class="btn-buy" onclick="addToCart(${p.id})">
                            <i class="fas fa-plus"></i> AGREGAR AL CARRITO
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filtrar() {
            const term = document.getElementById('buscador').value.toLowerCase();
            const filtrados = productos.filter(p => 
                p.nombre.toLowerCase().includes(term) || 
                (p.descripcion && p.descripcion.toLowerCase().includes(term))
            );
            renderizar(filtrados);
        }

        function addToCart(id) {
            const p = productos.find(x => x.id == id);
            carrito.push(p);
            document.getElementById('badge').innerText = carrito.length;
            
            // Efecto visual rápido
            const btn = event.currentTarget;
            const original = btn.innerHTML;
            btn.style.background = "#22c55e";
            btn.innerHTML = '<i class="fas fa-check"></i> ¡LISTO!';
            setTimeout(() => {
                btn.style.background = "";
                btn.innerHTML = original;
            }, 800);
        }

        function enviarPedido() {
            if (carrito.length === 0) {
                alert("El carrito está vacío. ¡Elegí algún repuesto!");
                return;
            }
            let total = 0;
            let msg = "Hola Bruno Repuestos! 🚗\nTe paso mi pedido de hoy:\n\n";
            carrito.forEach(i => {
                msg += `• ${i.nombre} - $${i.precio}\n`;
                total += Number(i.precio);
            });
            msg += `\n*Total Estimado: $${total.toLocaleString('es-AR')}*`;
            window.open(`https://wa.me/5492281310771?text=${encodeURIComponent(msg)}`);
        }

        cargarDatos();
    </script>
</body>
</html>
