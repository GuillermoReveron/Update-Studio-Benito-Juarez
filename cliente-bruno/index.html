<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Repuestos | Catálogo Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-fondo: #ffffff;
            --color-texto: #1a1a1a;
            --color-acento: #e63946; 
            --color-secundario: #f4f4f4;
            --color-whatsapp: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--color-fondo); color: var(--color-texto); }
        header { position: sticky; top: 0; background: white; z-index: 1000; border-bottom: 1px solid #eee; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5em; font-weight: 600; }
        
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .tarjeta { border: 1px solid #eee; padding: 15px; border-radius: 10px; text-align: center; background: white; transition: 0.3s; }
        .tarjeta:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tarjeta img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .precio { font-size: 1.2em; font-weight: 600; margin: 10px 0; color: var(--color-acento); }
        
        .btn { background: var(--color-texto); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: 600; }
        .btn-ws { background: var(--color-whatsapp); margin-top: 5px; }

        #carrito-flotante { position: fixed; bottom: 20px; right: 20px; background: var(--color-whatsapp); color: white; padding: 15px 20px; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">BRUNO REPUESTOS</div>
        <div id="cart-icon"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></div>
    </header>

    <div class="grid-productos" id="contenedor-productos">
        <p>Cargando repuestos...</p>
    </div>

    <div id="carrito-flotante" onclick="enviarPedido()">
        <i class="fab fa-whatsapp"></i> Enviar pedido (<span id="cart-total">0</span>)
    </div>

    <script>
        // LA NUEVA API QUE FUNCIONA
        const urlAPI = 'https://script.google.com/macros/s/AKfycbxzt_H5NGX42uZA1qvPD232h1VEFn7lwSrUtkkiCiwy7JvKzfIHPbyh0K689-olMBhl/exec';
        const numeroWhatsapp = "5492281310771"; 
        
        let productos = [];
        let carrito = [];

        async function obtenerProductos() {
            try {
                const response = await fetch(urlAPI);
                productos = await response.json();
                renderizar(productos);
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('contenedor-productos').innerHTML = "Error al cargar productos. Revisa la planilla.";
            }
        }

        function renderizar(lista) {
            const container = document.getElementById('contenedor-productos');
            container.innerHTML = "";
            lista.forEach(p => {
                container.innerHTML += `
                    <div class="tarjeta">
                        <img src="${p.img || 'https://via.placeholder.com/200'}" alt="${p.nombre}">
                        <h3>${p.nombre}</h3>
                        <p>${p.descripcion || ''}</p>
                        <div class="precio">$${p.precio}</div>
                        <button class="btn" onclick="agregar(${p.id})">Agregar al carrito</button>
                    </div>
                `;
            });
        }

        function agregar(id) {
            const prod = productos.find(x => x.id == id);
            carrito.push(prod);
            actualizarUI();
        }

        function actualizarUI() {
            document.getElementById('cart-count').innerText = carrito.length;
            document.getElementById('cart-total').innerText = carrito.length;
            document.getElementById('carrito-flotante').style.display = carrito.length > 0 ? "block" : "none";
        }

        function enviarPedido() {
            let mensaje = "Hola Bruno! Quiero consultar por estos repuestos:\n\n";
            carrito.forEach(p => {
                mensaje += `- ${p.nombre} ($${p.precio})\n`;
            });
            const url = `https://wa.me/${numeroWhatsapp}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        obtenerProductos();
    </script>
</body>
</html>
