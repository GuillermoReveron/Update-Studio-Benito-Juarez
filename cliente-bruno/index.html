<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Repuestos | Update Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #ef4444; --text: #f8fafc; --whatsapp: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; }
        header { position: sticky; top: 0; z-index: 1000; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Oswald', sans-serif; font-size: 1.6rem; text-transform: uppercase; }
        .logo span { color: var(--accent); }
        .swiper { width: 100%; height: 450px; background: #000; }
        .swiper-slide { position: relative; display: flex; align-items: center; justify-content: center; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        .slide-txt { position: absolute; text-align: center; z-index: 10; padding: 0 20px; }
        .slide-txt h2 { font-size: 3rem; font-family: 'Oswald'; text-transform: uppercase; color: #fff; }
        .search-box { padding: 30px 5%; text-align: center; }
        #buscador { width: 100%; max-width: 500px; padding: 15px; border-radius: 30px; border: none; background: var(--card); color: white; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 20px 5%; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-body { padding: 20px; flex-grow: 1; }
        .precio { font-size: 1.8rem; font-weight: 900; color: var(--accent); margin: 10px 0; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; }
        .cart-btn { position: fixed; bottom: 30px; right: 30px; background: var(--whatsapp); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1001; cursor: pointer; }
        #badge { position: absolute; top: 0; right: 0; background: white; color: black; padding: 3px 8px; border-radius: 50%; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo">BRUNO<span>.REPUESTOS</span></div>
    </header>

    <div class="swiper">
        <div class="swiper-wrapper" id="slider-content"></div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="search-box">
        <input type="text" id="buscador" placeholder="Buscar repuesto..." onkeyup="buscar()">
    </div>

    <div class="grid" id="lista-productos">
        <p style="text-align: center; grid-column: 1/-1;">Conectando con la planilla de Bruno...</p>
    </div>

    <div class="cart-btn" onclick="enviarWhatsApp()">
        <i class="fas fa-shopping-cart fa-lg" style="color:white"></i>
        <span id="badge">0</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Tu link actualizado
        const API_URL = 'https://script.google.com/macros/s/AKfycbyG1L0CFsEZg4jOgYJwx14jol83SKjl54PCnCgsx9TM7MqWOb4E4GsqCsmtPma-Wxg5/exec';
        let productos = [];
        let carrito = [];

        async function cargar() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                console.log("Datos recibidos:", data); // Para ver en la consola si llega algo

                // Cargar Carrusel con nombres flexibles
                const slider = document.getElementById('slider-content');
                if (data.carrusel && data.carrusel.length > 0) {
                    slider.innerHTML = data.carrusel.map(c => `
                        <div class="swiper-slide">
                            <img src="${c.img || c.Img || ''}" alt="Banner">
                            <div class="slide-txt">
                                <h2>${c.titulo || c.Titulo || ''}</h2>
                                <p>${c.descripcion || c.Descripcion || c.subtitulo || ''}</p>
                            </div>
                        </div>
                    `).join('');
                    new Swiper('.swiper', { pagination: { el: '.swiper-pagination' }, autoplay: { delay: 4000 }, loop: true });
                }

                // Cargar Productos
                productos = data.productos || [];
                renderizar(productos);
            } catch (e) {
                console.error("Error cargando datos:", e);
                document.getElementById('lista-productos').innerHTML = "Error al conectar. Verificá que la planilla tenga las solapas 'productos' y 'carrusel'.";
            }
        }

        function renderizar(lista) {
            const container = document.getElementById('lista-productos');
            if (lista.length === 0) {
                container.innerHTML = "No se encontraron productos en la planilla.";
                return;
            }
            container.innerHTML = lista.map(p => `
                <div class="card">
                    <img src="${p.img || p.Img || 'https://via.placeholder.com/400x300'}" alt="Repuesto">
                    <div class="card-body">
                        <h3>${p.nombre || p.Nombre || 'Sin nombre'}</h3>
                        <p style="color:#94a3b8; font-size:0.8rem; margin:10px 0;">${p.descripcion || p.Descripcion || ''}</p>
                        <div class="precio">$${p.precio || p.Precio || '0'}</div>
                        <button class="btn-add" onclick="agregar(${p.id || p.Id})">AGREGAR AL PEDIDO</button>
                    </div>
                </div>
            `).join('');
        }

        function buscar() {
            const q = document.getElementById('buscador').value.toLowerCase();
            const filtrados = productos.filter(p => (p.nombre || p.Nombre || '').toLowerCase().includes(q));
            renderizar(filtrados);
        }

        function agregar(id) {
            const p = productos.find(x => (x.id || x.Id) == id);
            if(p) {
                carrito.push(p);
                document.getElementById('badge').innerText = carrito.length;
            }
        }

        function enviarWhatsApp() {
            if (carrito.length === 0) return alert("Carrito vacío");
            let m = "Hola Bruno! Este es mi pedido:\n";
            carrito.forEach(i => m += `• ${i.nombre || i.Nombre} ($${i.precio || i.Precio})\n`);
            window.open(`https://wa.me/5492281310771?text=${encodeURIComponent(m)}`);
        }

        cargar();
    </script>
</body>
</html>
