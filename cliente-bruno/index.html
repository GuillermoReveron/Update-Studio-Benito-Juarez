<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Repuestos | Sitio Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(15, 23, 42, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); scroll-behavior: smooth; }

        /* NAVBAR */
        header { 
            position: sticky; top: 0; z-index: 1000; 
            background: var(--glass); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 10px 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; }
        .logo { font-family: 'Oswald', sans-serif; font-size: 1.5rem; color: var(--accent); }

        /* CARRUSEL (CALECITA) */
        .swiper { width: 100%; height: 400px; }
        .swiper-slide { position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        .slide-content { position: absolute; text-align: center; }
        .slide-content h2 { font-size: 3rem; font-family: 'Oswald'; text-transform: uppercase; }

        /* BUSCADOR */
        .search-section { padding: 40px 5%; text-align: center; background: #111827; }
        #buscador {
            width: 100%; max-width: 600px; padding: 15px 25px; border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.1); background: var(--bg);
            color: white; font-size: 1.1rem; outline: none;
        }

        /* PRODUCTOS */
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 50px 5%; }
        .tarjeta { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .tarjeta:hover { transform: translateY(-10px); border-color: var(--accent); }
        .tarjeta img { width: 100%; height: 230px; object-fit: cover; }
        .info { padding: 20px; }
        
        .btn-buy { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        /* CONTACTO */
        .contacto { padding: 80px 5%; background: #0a0f1e; text-align: center; }
        .social-icons { font-size: 2rem; display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .social-icons i { color: var(--accent); cursor: pointer; }

        /* FOOTER */
        footer { padding: 30px; text-align: center; font-size: 0.8rem; color: var(--text-dim); border-top: 1px solid rgba(255,255,255,0.1); }

        /* CARRITO */
        .cart-btn { position: fixed; bottom: 30px; right: 30px; background: #22c55e; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

    <header>
        <div class="logo">BRUNO.<span>REPUESTOS</span></div>
        <nav class="nav-links">
            <a href="#inicio">Inicio</a>
            <a href="#catalogo">Catálogo</a>
            <a href="#contacto">Contacto</a>
        </nav>
    </header>

    <div class="swiper" id="inicio">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?q=80&w=1600&auto=format&fit=crop" alt="Taller">
                <div class="slide-content"><h2>Repuestos Originales</h2><p>Calidad garantizada para tu motor</p></div>
            </div>
            <div class="swiper-slide">
                <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1600&auto=format&fit=crop" alt="Auto">
                <div class="slide-content"><h2>Stock Permanente</h2><p>Lo que buscás, lo tenemos</p></div>
            </div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <section class="search-section" id="catalogo">
        <input type="text" id="buscador" placeholder="¿Qué repuesto estás buscando?" onkeyup="filtrar()">
    </section>

    <div class="grid-productos" id="contenedor"></div>

    <section class="contacto" id="contacto">
        <h2>CONTACTANOS</h2>
        <p>Atención personalizada en Benito Juárez</p>
        <div class="social-icons">
            <i class="fab fa-whatsapp" onclick="window.open('https://wa.me/5492281310771')"></i>
            <i class="fab fa-instagram"></i>
            <i class="fas fa-map-marker-alt"></i>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Bruno Repuestos - Desarrollado por <strong>Update Studio</strong></p>
    </footer>

    <div class="cart-btn" onclick="enviarWhatsApp()">
        <i class="fas fa-shopping-cart"></i>
        <span id="count" style="position:absolute; top:0; right:0; background:red; padding:2px 6px; border-radius:50%; font-size:10px;">0</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const API = 'https://script.google.com/macros/s/AKfycbxzt_H5NGX42uZA1qvPD232h1VEFn7lwSrUtkkiCiwy7JvKzfIHPbyh0K689-olMBhl/exec';
        let productos = [];
        let carrito = [];

        // Iniciar Calecita
        new Swiper('.swiper', { pagination: { el: '.swiper-pagination' }, autoplay: { delay: 3000 } });

        async function cargar() {
            const r = await fetch(API);
            productos = await r.json();
            dibujar(productos);
        }

        function dibujar(lista) {
            const c = document.getElementById('contenedor');
            c.innerHTML = lista.map(p => `
                <div class="tarjeta">
                    <img src="${p.img || 'https://via.placeholder.com/300x200'}" alt="${p.nombre}">
                    <div class="info">
                        <h3>${p.nombre}</h3>
                        <div style="font-size:1.5rem; color:var(--accent); font-weight:800; margin:10px 0;">$${p.precio}</div>
                        <button class="btn-buy" onclick="agregar(${p.id})">COMPRAR / CONSULTAR</button>
                    </div>
                </div>
            `).join('');
        }

        function filtrar() {
            const b = document.getElementById('buscador').value.toLowerCase();
            dibujar(productos.filter(p => p.nombre.toLowerCase().includes(b)));
        }

        function agregar(id) {
            carrito.push(productos.find(p => p.id == id));
            document.getElementById('count').innerText = carrito.length;
        }

        function enviarWhatsApp() {
            if(carrito.length === 0) return alert("Elegí algún repuesto primero");
            let m = "Hola Bruno! Quiero consultar por:\n";
            carrito.forEach(i => m += `- ${i.nombre} ($${i.precio})\n`);
            window.open(`https://wa.me/5492281310771?text=${encodeURIComponent(m)}`);
        }

        cargar();
    </script>
</body>
</html>
