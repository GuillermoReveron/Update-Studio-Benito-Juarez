<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Studio - Selección de Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0f0f0f; /* Fondo oscuro elegante */
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .selector-container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .buttons-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-cliente {
            text-decoration: none;
            color: white;
            border: 1px solid #ffffff33;
            padding: 40px 60px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 200px;
        }

        .btn-cliente:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-cliente span {
            font-size: 1.2rem;
            font-weight: 400;
            margin-top: 10px;
        }

        .logo-placeholder {
            font-size: 2rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="selector-container">
        <h1>Update Studio - Catálogos</h1>
        
        <div class="buttons-grid">
            <a href="cliente-cecilia/index.html" class="btn-cliente">
                <div class="logo-placeholder">✨</div>
                <span>Cecilia Cosmética</span>
            </a>

            <a href="nombre-de-la-otra-carpeta/index.html" class="btn-cliente">
                <div class="logo-placeholder">💄</div>
                <span>Nombre del Cliente 2</span>
            </a>
        </div>
    </div>

</body>
</html>
