<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta Cosmética - Cecilia Llanos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-fondo: #ffffff;
            --color-texto: #1a1a1a;
            --color-acento: #d4af37;
            --color-secundario: #f9f9f9;
            --color-whatsapp: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--color-fondo); color: var(--color-texto); }
        h1, h2, h3, .logo { font-family: 'Playfair Display', serif; }

        /* HEADER Y NAVBAR */
        header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); z-index: 1000; border-bottom: 1px solid #eee; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; }
        .logo { font-size: 1.8em; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .menu a { text-decoration: none; color: var(--color-texto); margin: 0 15px; font-size: 0.9em; text-transform: uppercase; transition: color 0.3s; }
        .menu a:hover { color: var(--color-acento); }

        /* CARRUSEL DINÁMICO */
        .carrusel-contenedor { position: relative; height: 60vh; width: 100%; overflow: hidden; background-color: #000; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1s; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .slide.activo { opacity: 1; }
        .slide-texto { text-align: center; color: white; background: rgba(0,0,0,0.3); padding: 20px; backdrop-filter: blur(2px); }

        /* GRILLA DE PRODUCTOS */
        .seccion-padding { padding: 40px 5%; }
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .tarjeta { border: 1px solid #eee; padding-bottom: 20px; text-align: center; border-radius: 8px; overflow: hidden; background: white; transition: transform 0.3s; }
        .tarjeta:hover { transform: translateY(-5px); }
        .tarjeta img { width: 100%; height: 300px; object-fit: cover; }
        
        /* ESTILOS SIN STOCK */
        .tarjeta.sin-stock img { filter: grayscale(100%); opacity: 0.6; }
        .badge-stock { position: absolute; top: 15px; left: 15px; background: #d9534f; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.7em; }

        /* --- ADAPTACIÓN PARA CELULARES (Media Queries) --- */
        @media (max-width: 768px) {
            .navbar { flex-direction: column; padding: 10px; }
            .menu { margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; }
            .menu a { margin: 5px 10px; font-size: 0.8em; }
            .logo { font-size: 1.4em; }
            .carrusel-contenedor { height: 40vh; }
            .grid-productos { grid-template-columns: 1fr; } /* Un producto por fila en celular */
        }

        /* MODAL DE PAGO Y CARRITO (Resumido para el ejemplo) */
        .btn-whatsapp { background: var(--color-whatsapp); color: white; padding: 15px; border: none; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body id="arriba">
    <header>
        <nav class="navbar">
            <div class="logo">Cecilia Llanos</div>
            <div class="menu">
                <a href="#arriba">Inicio</a>
                <a href="#productos">Colección</a>
                <a href="#contacto">Contacto</a>
            </div>
        </nav>
    </header>

    <main>
        <section id="contenedor-carrusel" class="carrusel-contenedor">
            </section>

        <section id="productos" class="seccion-padding">
            <h2 style="text-align:center; margin-bottom:30px;">Nuestro Catálogo</h2>
            <div id="contenedor-productos" class="grid-productos">
                <div class="cargando">Cargando productos de Cecilia...</div>
            </div>
        </section>
    </main>

    <footer id="contacto">
        <div style="text-align: center; padding: 40px; background: #1a1a1a; color: white;">
            <h4>Contacto</h4>
            <p>WhatsApp: +54 9 228 131-0771</p>
        </div>
    </footer>

    <script>
        const urlAPI = 'https://script.google.com/macros/s/AKfycbzj2p3uFLLpDC6HQAy1BvZQuuLNHvlcKxDYyfrrzdPMPDOy09ALzsJVzDUaDoL1qYuLww/exec';
        let productos = [];

        async function cargarDatos() {
            try {
                const res = await fetch(urlAPI);
                const data = await res.json();
                productos = data.productos || data;
                dibujarCatalogo();
                // Aquí iría la función del carrusel que ya teníamos
            } catch (e) {
                console.error("Error", e);
            }
        }

        function dibujarCatalogo() {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = '';
            productos.forEach(p => {
                const tieneStock = String(p.stock).toUpperCase() === 'SI';
                contenedor.innerHTML += `
                    <div class="tarjeta ${tieneStock ? '' : 'sin-stock'}">
                        ${tieneStock ? '' : '<span class="badge-stock">SIN STOCK</span>'}
                        <img src="${p.img}" alt="${p.nombre}">
                        <h3>${p.nombre}</h3>
                        <p>$${p.precio}</p>
                        <button class="btn-whatsapp" ${tieneStock ? '' : 'disabled'}>
                            ${tieneStock ? 'Consultar' : 'Agotado'}
                        </button>
                    </div>
                `;
            });
        }

        cargarDatos();
    </script>
</body>
</html>
