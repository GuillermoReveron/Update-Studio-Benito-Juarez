<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cecilia Llanos | Alta Cosmética</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-fondo: #ffffff;
            --color-texto: #1a1a1a;
            --color-acento: #d4af37;
            --color-secundario: #f4f4f4;
            --color-whatsapp: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--color-fondo); color: var(--color-texto); }
        h1, h2, h3, .logo { font-family: 'Playfair Display', serif; }

        /* HEADER */
        header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); z-index: 1000; border-bottom: 1px solid #eee; }
        .top-bar { background-color: var(--color-texto); color: var(--color-acento); text-align: center; padding: 10px; font-size: 0.85em; letter-spacing: 1px; font-weight: 600; text-transform: uppercase;}
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; }
        .logo { font-size: 2em; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .menu a { text-decoration: none; color: var(--color-texto); margin: 0 15px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .menu a:hover { color: var(--color-acento); }
        .iconos-nav { position: relative; cursor: pointer; }
        .contador-carrito { position: absolute; top: -8px; right: -10px; background: var(--color-acento); color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7em; font-weight: bold; }

        /* CARRUSEL */
        .carrusel-contenedor { position: relative; height: 60vh; width: 100%; overflow: hidden; background-color: #000; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .slide.activo { opacity: 1; }
        .slide-texto { text-align: center; color: white; background: rgba(0,0,0,0.3); padding: 30px 50px; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(2px); }
        .slide-texto h2 { font-size: 3em; margin-bottom: 10px; font-weight: 400; }

        /* PRODUCTOS DESTACADOS (SCROLL HORIZONTAL CENTRADO) */
        .seccion-destacado { padding: 50px 5%; background-color: var(--color-secundario); display: none; }
        .titulo-destacado { text-align: center; font-family: 'Playfair Display', serif; font-size: 2em; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s; }
        
        .grid-destacados { 
            display: flex; 
            gap: 30px; 
            overflow-x: auto; 
            padding: 10px 10px 30px 10px; 
            scroll-snap-type: x mandatory; 
            width: fit-content;
            max-width: 100%;
            margin: 0 auto;
        }
        
        .grid-destacados::-webkit-scrollbar { height: 8px; }
        .grid-destacados::-webkit-scrollbar-track { background: #ddd; border-radius: 10px; }
        .grid-destacados::-webkit-scrollbar-thumb { background: #bbb; border-radius: 10px; }

        .tarjeta-destacado { 
            flex: 0 0 300px; 
            scroll-snap-align: start;
            background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: center; padding-bottom: 20px; border-top: 4px solid var(--color-acento); position: relative; transition: transform 0.3s;
        }
        .tarjeta-destacado:hover { transform: translateY(-5px); }
        .etiqueta-promo { position: absolute; top: 15px; right: 15px; color: white; padding: 5px 10px; font-size: 0.7em; font-weight: bold; text-transform: uppercase; border-radius: 4px; z-index: 2; letter-spacing: 1px;}
        .tarjeta-destacado img { width: 100%; height: 250px; object-fit: cover; margin-bottom: 15px; }
        .tarjeta-destacado h3 { font-size: 1.2em; margin: 0 15px 5px; color: var(--color-texto); }
        .tarjeta-destacado .descripcion-producto { font-size: 0.85em; color: #666; margin: 0 15px 10px; height: 38px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }
        .tarjeta-destacado .precio { font-size: 1.4em; color: var(--color-texto); font-weight: 600; margin-bottom: 15px; }

        /* CATÁLOGO NORMAL */
        .seccion-padding { padding: 60px 5%; min-height: 400px; }
        .titulo-seccion { text-align: center; font-size: 2.5em; margin-bottom: 40px; font-weight: 400; }
        
        .cargando { text-align: center; font-size: 1.2em; color: #888; margin: 50px 0; font-style: italic; }
        
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        
        .tarjeta { position: relative; text-align: center; transition: transform 0.3s; border: 1px solid #eee; padding-bottom: 20px; border-radius: 8px; overflow: hidden; background: white;}
        .tarjeta:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .tarjeta img { width: 100%; height: 350px; object-fit: cover; margin-bottom: 15px; transition: filter 0.3s; }
        .tarjeta h3 { font-size: 1.2em; margin: 0 15px 5px; }
        
        .descripcion-producto { font-size: 0.85em; color: #666; margin: 0 15px 15px; height: 40px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }

        .precio { font-size: 1.2em; color: var(--color-texto); font-weight: 600; margin-bottom: 20px; }
        
        /* ESTILOS SIN STOCK */
        .badge-stock { position: absolute; top: 15px; left: 15px; background-color: #d9534f; color: white; padding: 5px 12px; border-radius: 4px;
