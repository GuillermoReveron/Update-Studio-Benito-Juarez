<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cecilia Llanos | Alta Cosmética</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-fondo: #ffffff;
            --color-texto: #1a1a1a;
            --color-acento: #d4af37;
            --color-secundario: #f4f4f4;
            --color-whatsapp: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--color-fondo); color: var(--color-texto); }
        h1, h2, h3, .logo { font-family: 'Playfair Display', serif; }

        /* HEADER */
        header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); z-index: 1000; border-bottom: 1px solid #eee; }
        .top-bar { background-color: var(--color-texto); color: var(--color-acento); text-align: center; padding: 10px; font-size: 0.85em; letter-spacing: 1px; font-weight: 600; text-transform: uppercase;}
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; }
        .logo { font-size: 2em; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .menu a { text-decoration: none; color: var(--color-texto); margin: 0 15px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .menu a:hover { color: var(--color-acento); }
        .iconos-nav { position: relative; cursor: pointer; }
        .contador-carrito { position: absolute; top: -8px; right: -10px; background: var(--color-acento); color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7em; font-weight: bold; }

        /* CARRUSEL */
        .carrusel-contenedor { position: relative; height: 60vh; width: 100%; overflow: hidden; background-color: #000; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .slide.activo { opacity: 1; }
        .slide-texto { text-align: center; color: white; background: rgba(0,0,0,0.3); padding: 30px 50px; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(2px); }
        .slide-texto h2 { font-size: 3em; margin-bottom: 10px; font-weight: 400; }

        /* PRODUCTOS DESTACADOS (SCROLL HORIZONTAL CENTRADO) */
        .seccion-destacado { padding: 50px 5%; background-color: var(--color-secundario); display: none; }
        .titulo-destacado { text-align: center; font-family: 'Playfair Display', serif; font-size: 2em; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s; }
        
        .grid-destacados { 
            display: flex; 
            gap: 30px; 
            overflow-x: auto; 
            padding: 10px 10px 30px 10px; 
            scroll-snap-type: x mandatory; 
            width: fit-content;
            max-width: 100%;
            margin: 0 auto;
        }
        
        .grid-destacados::-webkit-scrollbar { height: 8px; }
        .grid-destacados::-webkit-scrollbar-track { background: #ddd; border-radius: 10px; }
        .grid-destacados::-webkit-scrollbar-thumb { background: #bbb; border-radius: 10px; }

        .tarjeta-destacado { 
            flex: 0 0 300px; 
            scroll-snap-align: start;
            background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: center; padding-bottom: 20px; border-top: 4px solid var(--color-acento); position: relative; transition: transform 0.3s;
        }
        .tarjeta-destacado:hover { transform: translateY(-5px); }
        .etiqueta-promo { position: absolute; top: 15px; right: 15px; color: white; padding: 5px 10px; font-size: 0.7em; font-weight: bold; text-transform: uppercase; border-radius: 4px; z-index: 2; letter-spacing: 1px;}
        .tarjeta-destacado img { width: 100%; height: 250px; object-fit: cover; margin-bottom: 15px; }
        .tarjeta-destacado h3 { font-size: 1.2em; margin: 0 15px 5px; color: var(--color-texto); }
        .tarjeta-destacado .descripcion-producto { font-size: 0.85em; color: #666; margin: 0 15px 10px; height: 38px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }
        .tarjeta-destacado .precio { font-size: 1.4em; color: var(--color-texto); font-weight: 600; margin-bottom: 15px; }

        /* CATÁLOGO NORMAL */
        .seccion-padding { padding: 60px 5%; min-height: 400px; }
        .titulo-seccion { text-align: center; font-size: 2.5em; margin-bottom: 40px; font-weight: 400; }
        
        .cargando { text-align: center; font-size: 1.2em; color: #888; margin: 50px 0; font-style: italic; }
        
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        
        .tarjeta { position: relative; text-align: center; transition: transform 0.3s; border: 1px solid #eee; padding-bottom: 20px; border-radius: 8px; overflow: hidden; background: white;}
        .tarjeta:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .tarjeta img { width: 100%; height: 350px; object-fit: cover; margin-bottom: 15px; transition: filter 0.3s; }
        .tarjeta h3 { font-size: 1.2em; margin: 0 15px 5px; }
        
        .descripcion-producto { font-size: 0.85em; color: #666; margin: 0 15px 15px; height: 40px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }

        .precio { font-size: 1.2em; color: var(--color-texto); font-weight: 600; margin-bottom: 20px; }
        
        /* ESTILOS SIN STOCK */
        .badge-stock { position: absolute; top: 15px; left: 15px; background-color: #d9534f; color: white; padding: 5px 12px; border-radius: 4px; font-size: 0.75em; font-weight: bold; z-index: 2; letter-spacing: 1px; text-transform: uppercase;}
        .tarjeta.sin-stock, .tarjeta-destacado.sin-stock { border-color: #e0e0e0; border-top-color: #ccc !important; }
        .tarjeta.sin-stock:hover, .tarjeta-destacado.sin-stock:hover { transform: none; box-shadow: none; }
        .tarjeta.sin-stock img, .tarjeta-destacado.sin-stock img { filter: grayscale(100%); opacity: 0.6; }
        .tarjeta.sin-stock h3, .tarjeta-destacado.sin-stock h3 { color: #888; }
        .tarjeta.sin-stock .precio, .tarjeta-destacado.sin-stock .precio { color: #aaa; text-decoration: line-through; }
        
        /* BOTONES DUALES */
        .botones-producto { display: flex; gap: 10px; padding: 0 15px; }
        .btn { flex: 1; padding: 12px 10px; border: none; text-transform: uppercase; font-size: 0.75em; font-weight: 600; cursor: pointer; transition: all 0.3s; border-radius: 4px; letter-spacing: 0.5px;}
        .btn-comprar { background-color: var(--color-texto); color: white; }
        .btn-comprar:hover:not(:disabled) { background-color: var(--color-acento); }
        .btn-agregar { background-color: transparent; border: 1px solid var(--color-texto); color: var(--color-texto); }
        .btn-agregar:hover:not(:disabled) { background-color: var(--color-secundario); }
        .btn:disabled { background-color: #f0f0f0; border-color: #ddd; color: #aaa; cursor: not-allowed; }

        /* MEDIOS DE PAGO DESTACANDO UALÁ */
        .medios-pago { background-color: var(--color-secundario); padding: 50px 20px; text-align: center; }
        .pago-principal { display: inline-block; border: 2px solid var(--color-acento); padding: 15px 40px; border-radius: 8px; margin-bottom: 20px; background: white; }
        .pago-principal h4 { color: var(--color-acento); font-size: 0.9em; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .pago-principal i { font-size: 2em; color: var(--color-texto); vertical-align: middle; margin-right: 10px; }
        .pago-principal span { font-size: 1.5em; font-weight: bold; font-family: 'Montserrat', sans-serif; }
        .pagos-secundarios { font-size: 0.85em; color: #666; font-weight: 600; letter-spacing: 1px; }

        /* FOOTER */
        footer { background-color: var(--color-texto); color: white; padding: 60px 5% 20px; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; margin-bottom: 40px; }
        .footer-grid h4 { font-family: 'Playfair Display', serif; font-size: 1.3em; margin-bottom: 20px; color: var(--color-acento); }

        /* CARRITO LATERAL */
        .carrito-lateral { position: fixed; top: 0; right: -400px; width: 350px; height: 100vh; background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1); transition: right 0.3s ease; z-index: 2000; padding: 20px; display: flex; flex-direction: column; }
        .carrito-lateral.abierto { right: 0; }
        .cerrar-carrito { text-align: right; cursor: pointer; font-size: 1.5em; }
        .items-carrito { flex-grow: 1; overflow-y: auto; margin: 20px 0; }
        .item-carrito { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; font-size: 0.9em;}
        .item-nombre { display: flex; flex-direction: column; }
        .total-carrito { font-size: 1.2em; font-weight: bold; margin-bottom: 20px; text-align: right; border-top: 2px solid #eee; padding-top: 15px;}
        .btn-pagar-carrito { background-color: var(--color-texto); color: white; text-align: center; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 4px; text-transform: uppercase; }

        /* MODAL DE PAGO (CHECKOUT) */
        .overlay-pago { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(3px); }
        .overlay-pago.activo { display: flex; }
        .caja-pago { background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 450px; position: relative; text-align: center; max-height: 90vh; overflow-y: auto;}
        .cerrar-pago { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 1.5em; color: #666; }
        .caja-pago h3 { font-size: 1.5em; margin-bottom: 10px; color: var(--color-texto); }
        .monto-pagar { font-size: 2em; font-weight: bold; color: var(--color-acento); margin-bottom: 20px; }
        .datos-bancarios { background: var(--color-secundario); padding: 15px; border-radius: 6px; text-align: left; margin-bottom: 20px; font-size: 0.9em; line-height: 1.6;}
        .caja-uala { background: white; border-left: 4px solid var(--color-acento); padding: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .caja-uala p { margin-bottom: 3px; }
        .etiqueta-recomendado { color: var(--color-acento); font-size: 0.75em; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; letter-spacing: 1px;}
