<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cecilia Llanos - Cuidado Personal</title>
    <style>
        /* Diseño general: colores suaves que transmiten frescura */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #faf9f6; /* Blanco roto muy suave */
            color: #333; 
            margin: 0; 
            padding: 0; 
        }
        header { 
            background-color: #e3d5ca; /* Tono piel/nude suave */
            padding: 30px 20px; 
            text-align: center; 
        }
        h1 { 
            margin: 0; 
            color: #5a4a42; /* Marrón oscuro para contrastar */
            font-size: 2.5em;
        }
        .subtitulo {
            color: #7f6a5d;
            font-size: 1.2em;
            margin-top: 5px;
        }
        
        /* Contenedor de los productos */
        .catalogo { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 25px; 
            padding: 40px 20px; 
        }
        
        /* Diseño de cada tarjeta de crema */
        .tarjeta { 
            background: white; 
            border: 1px solid #f0eaea; 
            border-radius: 12px; 
            width: 260px; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
            transition: transform 0.2s;
        }
        .tarjeta:hover {
            transform: translateY(-5px); /* Pequeño efecto al pasar el mouse */
        }
        .tarjeta img { 
            max-width: 100%; 
            border-radius: 8px; 
            margin-bottom: 15px;
        }
        .tarjeta h3 {
            margin: 0 0 10px 0;
            color: #5a4a42;
        }
        .descripcion {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
            height: 40px; /* Mantiene la altura pareja aunque el texto varíe */
        }
        .precio { 
            font-size: 1.3em; 
            font-weight: bold; 
            color: #2c3e50; 
            margin-bottom: 15px;
        }
        .btn-comprar { 
            display: block; 
            background-color: #9cb3a8; /* Verde salvia muy de cosmética */
            color: white; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold;
        }
        .btn-comprar:hover { 
            background-color: #7a9388; 
        }
    </style>
</head>
<body>

    <header>
        <h1>Cecilia Llanos</h1>
        <p class="subtitulo">Cosmética y Cuidado Personal</p>
    </header>

    <main>
        <div class="catalogo" id="contenedor-productos">
            <!-- Acá JavaScript va a inyectar las tarjetas de cremas automáticamente -->
        </div>
    </main>

    <script>
        // 1. DATOS DE PRUEBA: Esto simula las columnas que vas a tener en Google Sheets
        const datosDesdePlanilla = [
            {
                nombre: "Crema Facial Hidratante",
                descripcion: "Uso diario con Vitamina E. Rápida absorción.",
                precio: 12500,
                imagen: "https://via.placeholder.com/250x200?text=Crema+Facial", // Imagen falsa temporal
                linkPago: "#" // Acá irá el link de Mercado Pago
            },
            {
                nombre: "Crema de Manos Reparadora",
                descripcion: "Ideal para pieles secas o agrietadas.",
                precio: 8300,
                imagen: "https://via.placeholder.com/250x200?text=Crema+Manos",
                linkPago: "#"
            },
            {
                nombre: "Loción Corporal Reafirmante",
                descripcion: "Mejora la elasticidad de la piel en 14 días.",
                precio: 15000,
                imagen: "https://via.placeholder.com/250x200?text=Locion+Corporal",
                linkPago: "#"
            }
        ];

        // 2. FUNCIÓN PARA DIBUJAR LOS PRODUCTOS
        function renderizarCatalogo() {
            const contenedor = document.getElementById('contenedor-productos');
            
            // Recorremos la lista de prueba y por cada producto creamos su tarjeta
            datosDesdePlanilla.forEach(producto => {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta';
                
                // Armamos el HTML interno de la tarjeta usando los datos
                tarjeta.innerHTML = `
                    <img src="${producto.imagen}" alt="${producto.nombre}">
                    <h3>${producto.nombre}</h3>
                    <p class="descripcion">${producto.descripcion}</p>
                    <div class="precio">$${producto.precio}</div>
                    <a href="${producto.linkPago}" class="btn-comprar" target="_blank">Comprar</a>
                `;
                
                contenedor.appendChild(tarjeta);
            });
        }

        // 3. Ejecutamos la función al cargar la página
        renderizarCatalogo();
    </script>

</body>
</html>
