<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOGLOBO | Estudio Benito Juárez</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #000000;
            --secundario: #ffffff;
            --acento: #333333;
            --texto-gris: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primario);
            color: var(--secundario);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA LATERAL IZQUIERDA */
        .sidebar {
            width: 35%;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid var(--acento);
        }

        .brand h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
        }

        .brand p {
            color: var(--texto-gris);
            letter-spacing: 3px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .nav-links {
            list-style: none;
            margin-top: 3rem;
        }

        .nav-links li {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--texto-gris);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-links li:hover {
            color: var(--secundario);
            padding-left: 10px;
        }

        .cart-status {
            background: var(--secundario);
            color: var(--primario);
            padding: 1.2rem;
            text-align: center;
            font-weight: bold;
            border-radius: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .cart-status:hover {
            background: #cccccc;
        }

        /* SECCIÓN DERECHA DE PRODUCTOS */
        .content {
            width: 65%;
            overflow-y: scroll;
            padding: 4rem;
            scroll-behavior: smooth;
        }

        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        .producto-item {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .producto-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border: 1px solid #222;
            transition: 0.5s;
        }

        .producto-item:hover .producto-img {
            border-color: var(--secundario);
        }

        .producto-info h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .producto-info p {
            color: var(--texto-gris);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .btn-buy {
            border: 1px solid var(--secundario);
            background: transparent;
            color: var(--secundario);
            padding: 0.8rem;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-buy:hover {
            background: var(--secundario);
            color: var(--primario);
        }

        /* MODAL DE PAGOS */
        #modal-pago {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            padding: 2.5rem;
            border: 1px solid var(--acento);
            max-width: 500px;
            width: 90%;
        }

        .metodos-lista {
            margin: 1.5rem 0;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; padding: 2rem; border-right: none; border-bottom: 1px solid var(--acento); }
            .content { width: 100%; padding: 2rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <h1>BIOGLOBO</h1>
            <p>ESTUDIO BENITO JUÁREZ</p>
            <ul class="nav-links">
                <li onclick="location.reload()">INICIO</li>
                <li>CATÁLOGO</li>
                <li>CONTACTO</li>
            </ul>
        </div>

        <div class="cart-status" onclick="abrirModal()">
            PEDIR AHORA (<span id="cart-count">0</span>)
        </div>
    </aside>

    <main class="content">
        <div class="grid-productos" id="contenedor-tienda">
            </div>
    </main>

    <div id="modal-pago">
        <div class="modal-content">
            <h2 style="letter-spacing: -1px;">RESUMEN DE PEDIDO</h2>
            <div id="resumen-lista" style="margin-top: 1rem; color: var(--texto-gris);"></div>
            <div class="metodos-lista">
                <p><strong>MÉTODOS DE PAGO:</strong></p>
                <p>💳 Ualá / Cuenta DNI / BNA</p>
                <p>Alias: estudio.benito.juarez</p>
            </div>
            <button class="btn-buy" onclick="enviarWhatsApp()">CONFIRMAR POR WHATSAPP</button>
            <button class="btn-buy" style="border:none; color: grey;" onclick="cerrarModal()">CANCELAR</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const SHEET_ID = 'TU_ID_DE_PLANILLA_AQUI'; // Reemplazá por tu ID
        const URL_SHEETS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
        
        let carrito = [];

        async function cargarProductos() {
            try {
                const response = await fetch(URL_SHEETS);
                const data = await response.text();
                const filas = data.split('\n').slice(1);
                const contenedor = document.getElementById('contenedor-tienda');
                contenedor.innerHTML = '';

                filas.forEach(fila => {
                    const columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(columnas.length >= 2) {
                        const nombre = columnas[0].replace(/"/g, "");
                        const precio = columnas[1].replace(/"/g, "");
                        // La imagen la busca por nombre en tu carpeta img/
                        const imagenURL = `img/${nombre.toLowerCase().replace(/ /g, "-")}.jpg`;

                        contenedor.innerHTML += `
                            <div class="producto-item">
                                <img src="${imagenURL}" class="producto-img" onerror="this.src='https://via.placeholder.com/400?text=${nombre}'">
                                <div class="producto-info">
                                    <h3>${nombre}</h3>
                                    <p>$${precio}</p>
                                    <button class="btn-buy" onclick="agregar('${nombre}', ${precio})">AÑADIR AL CARRITO</button>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (error) {
                console.error("Error al cargar planilla:", error);
            }
        }

        function agregar(nombre, precio) {
            carrito.push({nombre, precio});
            document.getElementById('cart-count').innerText = carrito.length;
        }

        function abrirModal() {
            if (carrito.length === 0) return alert("El carrito está vacío");
            const resumen = document.getElementById('resumen-lista');
            resumen.innerHTML = carrito.map(p => `<p>${p.nombre} - $${p.precio}</p>`).join('');
            document.getElementById('modal-pago').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal-pago').style.display = 'none';
        }

        function enviarWhatsApp() {
            let mensaje = "Hola BIOGLOBO! Quiero realizar el siguiente pedido:%0A%0A";
            let total = 0;
            carrito.forEach(p => {
                mensaje += `- ${p.nombre} ($${p.precio})%0A`;
                total += parseFloat(p.precio);
            });
            mensaje += `%0A*TOTAL: $${total}*%0APago vía: Ualá/Cuenta DNI`;
            
            // Reemplazá con tu número real
            window.open(`https://wa.me/5492281000000?text=${mensaje}`, '_blank');
        }

        cargarProductos();
    </script>
</body>
</html>
