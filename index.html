<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Benito Juárez | Tienda Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dorado: #b8926a;
            --crema: #fdfaf6;
            --oscuro: #2c2c2c;
            --blanco: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--crema);
            color: var(--oscuro);
        }

        header {
            background-color: var(--blanco);
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--dorado);
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Grilla de Productos */
        .productos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .producto-card {
            background: var(--blanco);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }

        .producto-card:hover { transform: translateY(-5px); }

        .producto-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .producto-info {
            padding: 1.5rem;
            text-align: center;
            flex-grow: 1;
        }

        .producto-titulo {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .producto-precio {
            color: var(--dorado);
            font-weight: 600;
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }

        .btn-agregar {
            background-color: var(--oscuro);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .btn-agregar:hover { background-color: var(--dorado); }

        /* Carrito Flotante */
        .cart-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--dorado);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        /* Modal de Pago */
        #modal-carrito {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .metodos-pago {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 1rem;
            border-radius: 5px;
            margin-top: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>ESTUDIO BENITO JUÁREZ</h1>
    <p>Colección Exclusiva</p>
</header>

<div class="container">
    <div class="productos-grid" id="contenedor-productos">
        </div>
</div>

<div class="cart-icon" onclick="abrirCarrito()">
    🛒 <span id="cart-count">0</span>
</div>

<div id="modal-carrito">
    <div class="modal-content">
        <h2 style="font-family: 'Playfair Display';">Tu Carrito</h2>
        <div id="carrito-items"></div>
        <hr>
        <p><strong>Total: $<span id="total-precio">0</span></strong></p>
        
        <div class="metodos-pago">
            <h3>Medios de Pago:</h3>
            <p>💳 Alias: <strong>estudio.benito.juarez</strong></p>
            <p>🏦 CBU: 0000000000000000000000</p>
            <a id="link-whatsapp" href="#" class="btn-whatsapp">Enviar pedido por WhatsApp</a>
            <button onclick="cerrarCarrito()" style="margin-top:10px; width:100%; padding:5px;">Cerrar</button>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN DE PRODUCTOS (Aquí cargás lo que quieras) ---
    const productos = [
        { id: 1, nombre: "Cuadro Minimalista", precio: 15500, img: "img/cuadro1.jpg" },
        { id: 2, nombre: "Vela Aromática Premium", precio: 4200, img: "img/vela.jpg" },
        { id: 3, nombre: "Jarrón de Cerámica", precio: 8900, img: "img/jarron.jpg" },
        { id: 4, nombre: "Set de Escritorio", precio: 12000, img: "img/set.jpg" }
    ];

    let carrito = [];

    function renderizarProductos() {
        const contenedor = document.getElementById('contenedor-productos');
        contenedor.innerHTML = '';
        productos.forEach(p => {
            contenedor.innerHTML += `
                <div class="producto-card">
                    <img src="${p.img}" alt="${p.nombre}" class="producto-img" onerror="this.src='https://via.placeholder.com/300x300?text=Imagen+No+Encontrada'">
                    <div class="producto-info">
                        <h3 class="producto-titulo">${p.nombre}</h3>
                        <p class="producto-precio">$${p.precio.toLocaleString()}</p>
                        <button class="btn-agregar" onclick="agregarAlCarrito(${p.id})">Agregar al Carrito</button>
                    </div>
                </div>
            `;
        });
    }

    function agregarAlCarrito(id) {
        const prod = productos.find(p => p.id === id);
        carrito.push(prod);
        actualizarCarrito();
    }

    function actualizarCarrito() {
        document.getElementById('cart-count').innerText = carrito.length;
        const total = carrito.reduce((sum, p) => sum + p.price, 0); // Corrección aquí abajo
    }

    function abrirCarrito() {
        const itemsDiv = document.getElementById('carrito-items');
        const totalSpan = document.getElementById('total-precio');
        const linkWA = document.getElementById('link-whatsapp');
        
        itemsDiv.innerHTML = '';
        let total = 0;
        let mensajeWA = "Hola! Me interesa comprar:%0A";

        carrito.forEach((p, index) => {
            itemsDiv.innerHTML += `<p>${p.nombre} - $${p.precio} <button onclick="eliminar(${index})">❌</button></p>`;
            total += p.precio;
            mensajeWA += `- ${p.nombre} ($${p.precio})%0A`;
        });

        totalSpan.innerText = total.toLocaleString();
        mensajeWA += `%0ATotal: $${total}`;
        // REEMPLAZA ESTE NÚMERO POR EL TUYO
        linkWA.href = `https://wa.me/5492281000000?text=${mensajeWA}`;
        
        document.getElementById('modal-carrito').style.display = 'flex';
    }

    function cerrarCarrito() {
        document.getElementById('modal-carrito').style.display = 'none';
    }

    function eliminar(index) {
        carrito.splice(index, 1);
        actualizarCarrito();
        abrirCarrito();
    }

    // Iniciar
    renderizarProductos();
</script>

</body>
</html>
